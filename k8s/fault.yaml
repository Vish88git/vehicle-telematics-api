apiVersion: apps/v1
kind: Deployment
metadata:
  name: fault-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fault-service
  template:
    metadata:
      labels:
        app: fault-service
    spec:
      containers:
        - name: fault-service
          image: vehicle-telematics-api-fault-service:latest
          ports:
            - containerPort: 3002
---
apiVersion: v1
kind: Service
metadata:
  name: fault-service
spec:
  selector:
    app: fault-service
  ports:
    - port: 3002
      targetPort: 3002
  type: ClusterIP
