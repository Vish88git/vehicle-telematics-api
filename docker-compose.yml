version: "3.8"

services:
  telemetry-service:
    build:
      context: .
      dockerfile: services/telemetry-service/Dockerfile
    ports:
      - "3001:3001"

  fault-service:
    build:
      context: .
      dockerfile: services/fault-service/Dockerfile
    ports:
      - "3002:3002"

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    ports:
      - "3003:3003"

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    ports:
      - "3333:3000"
    depends_on:
      - telemetry-service
      - fault-service
      - notification-service
